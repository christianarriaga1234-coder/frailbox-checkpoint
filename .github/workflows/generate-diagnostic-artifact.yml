name: Generate diagnostic artifact

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: Commit SHA to build diagnostics for
        required: true

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out target commit
        run: git checkout "${{ inputs.target_sha }}"

      - name: Install optional build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 ghc
          sudo ln -sf /usr/bin/luac5.4 /usr/local/bin/luac

      - name: Run diagnostic build
        run: |
          git config user.name "diagnostic-runner"
          git config user.email "diagnostic-runner@example.invalid"
          python3 build.py || true

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: tentoftrials-diagnostic
          path: |
            diagnostic/*.logd
            diagnostic/*.json
